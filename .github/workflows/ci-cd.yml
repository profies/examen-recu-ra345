# =========================================================
# Workflow CI/CD para GitHub Actions
# Objetivo:
# 1. Descargar el código del repositorio
# 2. Compilar el proyecto Java con Maven
# 3. Construir una imagen Docker
# 4. Publicar la imagen en GitHub Container Registry (GHCR)
# =========================================================

# ===== Nombre del workflow =====
name: CI/CD Del código a la publicación de la imagen Docker en GitHub Container Registry

# =========================================================
# EVENTOS QUE DISPARAN EL WORKFLOW
# =========================================================
on:
  push:
    branches:
      - '**'   # Se ejecuta en cualquier rama

# =========================================================
# PERMISOS DEL TOKEN AUTOMÁTICO DE GITHUB
# =========================================================
permissions:
  contents: read
  packages: write

# =========================================================
# DEFINICIÓN DE TAREAS (jobs)
# =========================================================
jobs:

  build-and-push:

    # Máquina virtual que utilizará GitHub
    runs-on: ubuntu-latest

    # =====================================================
    # PASOS DEL JOB
    # =====================================================
    steps:

      # ---------------------------------------------------
      # 1. Descargar el código del repositorio
      # ---------------------------------------------------
      - name: Checkout del código
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # 2. Instalar Java
      #
      # distribution: temurin -> distribución OpenJDK
      # java-version: 23      -> versión de Java
      # cache: maven          -> acelera futuras compilaciones
      # ---------------------------------------------------
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23
          cache: maven

      # ---------------------------------------------------
      # 3. Compilar proyecto Maven
      # También ejecuta tests automáticamente
      # ---------------------------------------------------
      - name: Compilar proyecto Maven
        run: mvn clean package

      # ---------------------------------------------------
      # 4. Login en GitHub Container Registry
      #
      # github.actor -> usuario que ejecuta el workflow
      # GITHUB_TOKEN -> token automático generado por GitHub
      # ---------------------------------------------------
      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------
      # 5. Construcción y publicación de la imagen Docker
      #
      # context: . -> usa el directorio actual
      # push: true -> sube la imagen al registro
      #
      # La imagen quedará publicada como:
      # ghcr.io/USUARIO/REPOSITORIO:latest
      # ---------------------------------------------------
      - name: Build y Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
